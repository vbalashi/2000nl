name: Database Drift Check

on:
  pull_request:
    paths:
      - 'db/migrations/**'
      - 'db/scripts/local_supabase_probe.sql'
      - 'db/scripts/plain_postgres_supabase_compat.sql'
      - 'db/scripts/live_dictionary_migration*.sql'
      - 'db/scripts/live_dictionary_migration.sh'
      - '.github/workflows/db-drift-check.yml'
  push:
    branches: [main, master]
    paths:
      - 'db/migrations/**'
      - 'db/scripts/local_supabase_probe.sql'
      - 'db/scripts/plain_postgres_supabase_compat.sql'
      - 'db/scripts/live_dictionary_migration*.sql'
      - 'db/scripts/live_dictionary_migration.sh'
      - '.github/workflows/db-drift-check.yml'
  workflow_dispatch:

jobs:
  check-drift:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: contract_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Check migration anti-patterns
        id: check-patterns
        run: |
          echo "Checking for migration anti-patterns..."

          ISSUES_FOUND=false

          # Check all migration files for non-optimized auth.uid()
          for file in db/migrations/*.sql; do
            # Skip if no SQL files
            [ -f "$file" ] || continue

            # Check for auth.uid() without (select ...) wrapper
            if grep -n 'auth\.uid()' "$file" | grep -v '(select auth.uid())' | grep -q .; then
              echo "::error file=$file::Contains non-optimized auth.uid() - use (select auth.uid()) for 99% faster queries"
              ISSUES_FOUND=true
            fi

            # Check for TO public in policies (should be TO authenticated)
            if grep -n 'TO public' "$file" | grep -q 'POLICY'; then
              echo "::warning file=$file::Contains 'TO public' in policy - use 'TO authenticated' for better performance"
            fi

            # Check for non-idempotent CREATE statements without IF NOT EXISTS
            if grep -n '^[[:space:]]*CREATE TABLE ' "$file" | grep -v 'IF NOT EXISTS' | grep -q .; then
              echo "::warning file=$file::CREATE TABLE without IF NOT EXISTS - migration may not be idempotent"
            fi
          done

          if [ "$ISSUES_FOUND" = true ]; then
            echo "result=failed" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "result=passed" >> $GITHUB_OUTPUT
          fi

      - name: Check migration file naming and bootstrap coverage
        run: |
          echo "Checking migration file naming conventions and bootstrap coverage..."

          ISSUES_FOUND=false

          migration_list="$(mktemp)"
          bootstrap_include_list="$(mktemp)"
          trap 'rm -f "$migration_list" "$bootstrap_include_list"' EXIT

          find db/migrations -maxdepth 1 -type f -name '*.sql' ! -name 'bootstrap.sql' | sort > "$migration_list"

          if [ ! -s "$migration_list" ]; then
            echo "::error::No numbered migration files found in db/migrations"
            exit 1
          fi

          expected=1
          while IFS= read -r file; do
            base="$(basename "$file")"

            if [[ ! "$base" =~ ^[0-9]{3}_[a-z0-9_]+\.sql$ ]]; then
              echo "::error file=$file::Migration filename must match NNN_descriptive_name.sql"
              ISSUES_FOUND=true
              continue
            fi

            number="${base:0:3}"
            expected_padded="$(printf '%03d' "$expected")"
            if [ "$number" != "$expected_padded" ]; then
              echo "::error file=$file::Expected migration number $expected_padded, found $number"
              ISSUES_FOUND=true
            fi

            include_line="\\i db/migrations/$base"
            if ! grep -Fxq "$include_line" db/migrations/bootstrap.sql; then
              echo "::error file=db/migrations/bootstrap.sql::Missing bootstrap include for $base"
              ISSUES_FOUND=true
            fi

            expected=$((expected + 1))
          done < "$migration_list"

          grep -E '^\\i db/migrations/[0-9]{3}_[a-z0-9_]+\.sql$' db/migrations/bootstrap.sql | sed 's#^\\i db/migrations/##' > "$bootstrap_include_list" || true
          while IFS= read -r include; do
            if [ ! -f "db/migrations/$include" ]; then
              echo "::error file=db/migrations/bootstrap.sql::Bootstrap includes missing migration $include"
              ISSUES_FOUND=true
            fi
          done < "$bootstrap_include_list"

          if [ "$ISSUES_FOUND" = true ]; then
            exit 1
          fi

          migration_count="$(wc -l < "$migration_list" | tr -d ' ')"
          echo "Found $migration_count numbered migration files; bootstrap coverage is complete."

      - name: Check live migration helper syntax
        run: |
          bash -n db/scripts/live_dictionary_migration.sh
          db/scripts/live_dictionary_migration.sh plan >/tmp/live-dictionary-migration-plan.txt
          grep -q '051_remove_word_status_sync_bridge.sql' /tmp/live-dictionary-migration-plan.txt
          grep -q '052_drop_legacy_user_word_status.sql' /tmp/live-dictionary-migration-plan.txt

      - name: Apply bootstrap and probe contract
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/contract_test
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/scripts/plain_postgres_supabase_compat.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/migrations/bootstrap.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/scripts/local_supabase_probe.sql

      - name: Verify database connection (optional)
        if: github.event.pull_request.base.ref == 'main'
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::notice::SUPABASE_DB_URL not configured - skipping live drift check"
            echo "To enable live drift checking, add SUPABASE_DB_URL to repository secrets"
          else
            echo "Database connection configured - drift checking enabled"
            # TODO: Implement actual drift checking against live DB
            # This would require comparing pg_policies output with migration files
          fi

      - name: Summary
        if: success()
        run: |
          echo "✅ All migration checks passed!"
          echo ""
          echo "Verified:"
          echo "  - No non-optimized auth.uid() calls"
          echo "  - Migration file naming and sequence"
          echo "  - Bootstrap includes every numbered migration"
          echo ""
          echo "Note: Live database drift checking requires SUPABASE_DB_URL secret"
